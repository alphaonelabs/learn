<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Alpha One Labs</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT:'#4F46E5', dark:'#3730A3' } } } } };</script>
  <style>
    .hidden { display: none !important; }
    .gradient-hero { background: linear-gradient(135deg,#4F46E5 0%,#7C3AED 50%,#2563EB 100%); }
    .badge { display:inline-block; padding:2px 10px; border-radius:9999px; font-size:.75rem; font-weight:600; }
    .card-hover { transition:transform .2s,box-shadow .2s; }
    .card-hover:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

<nav class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
    <a href="/" class="flex items-center gap-2">
      <img src="/images/logo.png" alt="Alpha One Labs" class="h-8 w-auto" />
      <span class="font-bold text-xl text-slate-800">Alpha One Labs</span>
    </a>
    <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-600">
      <a href="/" class="hover:text-brand">Activities</a>
      <a href="/dashboard.html" class="text-brand hover:text-brand-dark">Dashboard</a>
      <a href="/teach.html" class="hover:text-brand" id="host-link">Host</a>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-slate-600 text-sm hidden sm:block" id="nav-user"></span>
      <button onclick="logout()" class="text-slate-400 text-sm hover:text-red-500 transition">Logout</button>
    </div>
  </div>
</nav>

<div class="gradient-hero text-white py-12 px-4">
  <div class="max-w-7xl mx-auto">
    <p class="text-indigo-200 text-sm font-medium mb-1" id="header-role-label">Dashboard</p>
    <h1 class="text-3xl font-extrabold" id="header-welcome">Welcome!</h1>
    <p class="text-indigo-200 mt-1 text-sm" id="header-sub"></p>
  </div>
</div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10" id="stat-cards"></div>
  <div id="quick-actions" class="mb-8"></div>
  <h2 class="text-xl font-bold text-slate-800 mb-5" id="section-title">My Activities</h2>
  <div id="activities-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <div class="bg-white rounded-2xl p-6 animate-pulse h-40"></div>
    <div class="bg-white rounded-2xl p-6 animate-pulse h-40"></div>
  </div>
  <div id="empty-state" class="hidden text-center py-20 text-slate-400">
    <p class="text-5xl mb-4">&#128459;</p>
    <p class="text-lg font-medium" id="empty-msg">Nothing here yet.</p>
    <a id="empty-action-link" href="/" class="mt-4 inline-block text-brand font-semibold hover:underline" id="empty-action-text">Browse activities</a>
  </div>
  <div id="joined-section"></div>
  <!-- Peer Connections Section -->
  <div class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-100 p-6" id="peers-section">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-slate-800 text-lg">&#128101; Peer Connections</h2>
      <span id="peer-requests-badge" class="hidden bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full"></span>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-4 border-b border-slate-100">
      <button type="button" role="tab" aria-selected="true" onclick="showPeerTab('connections')" id="tab-connections" class="peer-tab px-4 py-2 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600">My Peers</button>
      <button type="button" role="tab" aria-selected="false" onclick="showPeerTab('requests')" id="tab-requests" class="peer-tab px-4 py-2 text-sm font-semibold text-slate-400 border-b-2 border-transparent">Requests</button>
      <button type="button" role="tab" aria-selected="false" onclick="showPeerTab('find')" id="tab-find" class="peer-tab px-4 py-2 text-sm font-semibold text-slate-400 border-b-2 border-transparent">Find Peers</button>
    </div>

    <!-- My Connections -->
    <div id="peers-connections" class="peer-panel">
      <div id="peers-list" class="space-y-3"></div>
    </div>

    <!-- Incoming Requests -->
    <div id="peers-requests" class="peer-panel hidden">
      <div id="requests-list" class="space-y-3"></div>
    </div>

    <!-- Find Peers -->
    <div id="peers-find" class="peer-panel hidden">
      <p class="text-sm text-slate-500 mb-3">Connect with other learners from your activities.</p>
      <div id="suggestions-list" class="space-y-3"></div>
    </div>
  </div>
</main>

<footer class="bg-slate-800 text-slate-400 py-6 text-center text-sm mt-10">
  <p>&copy; 2024&ndash;2026 Alpha One Labs &middot; All user data encrypted at rest</p>
</footer>

<script>
  const API = '';
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const token = localStorage.getItem('edu_token');
  const user  = JSON.parse(localStorage.getItem('edu_user') || 'null');
  if (!token || !user) window.location.href = '/login.html';
  function logout() { localStorage.clear(); window.location.href = '/login.html'; }

  const typeIcon  = { course:'📚', meetup:'🤝', workshop:'🔧', seminar:'🎤', other:'✨' };
  const typeColor = { course:'bg-indigo-100 text-indigo-700', meetup:'bg-pink-100 text-pink-700', workshop:'bg-orange-100 text-orange-700', seminar:'bg-teal-100 text-teal-700', other:'bg-slate-100 text-slate-600' };
  const fmtLabel  = { live:'Live', self_paced:'Self-paced', hybrid:'Hybrid' };
  const schedLabel = { one_time:'One-time', multi_session:'Multi-session', recurring:'Recurring', ongoing:'Ongoing' };

  document.getElementById('nav-user').textContent = 'Hi, ' + user.username;

  async function loadDashboard() {
    const res  = await fetch('/api/dashboard', { headers:{ Authorization: 'Bearer ' + token } });
    const data = await res.json();
    renderDashboard(data);
  }

  function statCard(value, label, color) {
    return '<div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center"><p class="text-3xl font-extrabold ' + color + '">' + value + '</p><p class="text-slate-500 text-sm mt-1">' + label + '</p></div>';
  }

  function renderDashboard(data) {
    const hosted = data.hosted_activities || [];
    const joined = data.joined_activities || [];

    document.getElementById('header-role-label').textContent = 'Dashboard';
    document.getElementById('header-welcome').textContent    = 'Hello, ' + user.username + '!';
    document.getElementById('header-sub').textContent        = 'Manage your hosted activities and track your participation.';
    document.getElementById('section-title').textContent     = 'Hosted Activities';

    const totalParts = hosted.reduce((s,a) => s + (a.participant_count||0), 0);
    document.getElementById('stat-cards').innerHTML =
      statCard(hosted.length,  'Hosted',       'text-brand') +
      statCard(totalParts,     'Participants', 'text-purple-600') +
      statCard(joined.length,  'Joined',       'text-emerald-600') +
      statCard('🔒',           'Encrypted',    'text-amber-500');

    document.getElementById('quick-actions').innerHTML =
      '<div class="flex flex-wrap gap-3">' +
      '<a href="/teach.html" class="inline-flex items-center gap-2 bg-brand text-white font-semibold px-5 py-2.5 rounded-xl hover:bg-brand-dark transition text-sm">+ New Activity</a>' +
      '<a href="/" class="inline-flex items-center gap-2 bg-white border border-slate-200 text-slate-700 font-semibold px-5 py-2.5 rounded-xl hover:bg-slate-50 transition text-sm">Browse All</a>' +
      '</div>';

    if (!hosted.length) {
      document.getElementById('activities-list').innerHTML =
        '<p class="col-span-3 text-slate-400 text-sm text-center py-8">You haven\'t hosted any activities yet. <a href="/teach.html" class="text-brand font-semibold hover:underline">Create your first activity \u2192</a></p>';
    } else {
      document.getElementById('activities-list').innerHTML = hosted.map(a => {
        const tc   = typeColor[a.type] || 'bg-slate-100 text-slate-600';
        const ic   = typeIcon[a.type]  || '✨';
        const tags = (a.tags||[]).slice(0,3).map(t => '<span class="badge bg-slate-100 text-slate-500">' + esc(t) + '</span>').join('');
        return '<article class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-hover flex flex-col gap-3">' +
          '<div class="flex items-start justify-between gap-2">' +
            '<h3 class="font-bold text-slate-800 text-sm">' + ic + ' ' + esc(a.title) + '</h3>' +
            '<span class="badge ' + tc + ' shrink-0">' + esc(a.type) + '</span>' +
          '</div>' +
          '<div class="flex gap-3 text-xs text-slate-500">' +
            '<span>👥 ' + a.participant_count + '</span>' +
            '<span>🗓 ' + a.session_count + ' sessions</span>' +
            '<span>' + (fmtLabel[a.format]||a.format) + '</span>' +
          '</div>' +
          '<div class="flex flex-wrap gap-1">' + tags + '</div>' +
          '<div class="mt-auto flex gap-2">' +
            '<a href="/course.html?id=' + esc(a.id) + '" class="flex-1 text-center text-sm font-semibold text-brand border border-brand/30 rounded-lg py-1.5 hover:bg-indigo-50">View</a>' +
            '<a href="/teach.html?activity_id=' + esc(a.id) + '" class="flex-1 text-center text-sm font-semibold text-slate-600 border border-slate-200 rounded-lg py-1.5 hover:bg-slate-50">Manage</a>' +
          '</div>' +
          '</article>';
      }).join('');
    }

    const roleColor   = { participant:'bg-slate-100 text-slate-600', instructor:'bg-purple-100 text-purple-700', organizer:'bg-amber-100 text-amber-700' };
    const statusColor = { active:'bg-emerald-100 text-emerald-700', cancelled:'bg-red-100 text-red-700', completed:'bg-blue-100 text-blue-700' };

    let joinedHtml = '<h2 class="text-xl font-bold text-slate-800 mb-5 mt-10">Joined Activities</h2>';
    if (!joined.length) {
      joinedHtml += '<p class="text-slate-400 text-sm text-center py-8">You haven\'t joined any activities yet. <a href="/" class="text-brand font-semibold hover:underline">Browse activities \u2192</a></p>';
    } else {
      joinedHtml += '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">' + joined.map(a => {
        const tc  = typeColor[a.type] || 'bg-slate-100 text-slate-600';
        const ic  = typeIcon[a.type]  || '✨';
        const rc  = roleColor[a.enr_role]     || 'bg-slate-100 text-slate-600';
        const sc  = statusColor[a.enr_status] || 'bg-slate-100 text-slate-600';
        const tags = (a.tags||[]).slice(0,3).map(t => '<span class="badge bg-slate-100 text-slate-500">' + esc(t) + '</span>').join('');
        return '<article class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-hover flex flex-col gap-3">' +
          '<div class="flex items-start justify-between gap-2">' +
            '<h3 class="font-bold text-slate-800 text-sm">' + ic + ' ' + esc(a.title) + '</h3>' +
            '<span class="badge ' + tc + ' shrink-0">' + esc(a.type) + '</span>' +
          '</div>' +
          '<p class="text-xs text-slate-400">by ' + esc(a.host_name) + '</p>' +
          '<div class="flex flex-wrap gap-1.5">' +
            '<span class="badge ' + rc + '">' + esc(a.enr_role) + '</span>' +
            '<span class="badge ' + sc + '">' + esc(a.enr_status) + '</span>' +
            '<span class="text-xs text-slate-400">' + (fmtLabel[a.format]||a.format) + '</span>' +
          '</div>' +
          '<div class="flex flex-wrap gap-1">' + tags + '</div>' +
          '<a href="/course.html?id=' + esc(a.id) + '" class="mt-auto block text-center text-sm font-semibold text-brand border border-brand/30 rounded-lg py-1.5 hover:bg-indigo-50">View Activity</a>' +
          '</article>';
      }).join('') + '</div>';
    }
    document.getElementById('joined-section').innerHTML = joinedHtml;
  }

  loadDashboard().catch(e => {
    document.getElementById('activities-list').innerHTML =
      '<p class="col-span-3 text-red-400 text-sm">Failed to load dashboard: ' + e.message + '</p>';
  });
</script>

<script>


  // Peer Connections
  async function loadPeers() {
    if (!token) return;
    try {
      const [peersRes, reqRes] = await Promise.all([
        fetch('/api/peers', { headers: { Authorization: 'Bearer ' + token } }),
        fetch('/api/peers/requests', { headers: { Authorization: 'Bearer ' + token } })
      ]);
      const peersData = await peersRes.json();
      const reqData = await reqRes.json();
      renderPeers(peersData.data || []);
      renderRequests(reqData.data || []);
      const badge = document.getElementById('peer-requests-badge');
      const count = (reqData.data || []).length;
      if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
      else { badge.classList.add('hidden'); }
    } catch(e) { console.error('loadPeers', e); }
  }

  function renderPeers(peers) {
    const list = document.getElementById('peers-list');
    if (!peers.length) { list.innerHTML = '<p class="text-slate-400 text-sm">No connections yet. Find peers to connect!</p>'; return; }
    list.innerHTML = peers.map(p => {
      const initial = (p.peer_name || '?')[0].toUpperCase();
      return '<div class="flex items-center justify-between bg-slate-50 rounded-xl p-3 border border-slate-100">' +
        '<div class="flex items-center gap-3">' +
          '<div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm">' + initial + '</div>' +
          '<span class="font-semibold text-slate-800 text-sm">' + escP(p.peer_name) + '</span>' +
        '</div>' +
        '<button type="button" onclick="removePeer(\'' + p.connection_id + '\')" class="text-xs text-red-400 hover:text-red-600">Remove</button>' +
      '</div>';
    }).join('');
  }

  function renderRequests(requests) {
    const list = document.getElementById('requests-list');
    if (!requests.length) { list.innerHTML = '<p class="text-slate-400 text-sm">No pending requests.</p>'; return; }
    list.innerHTML = requests.map(r => {
      const initial = (r.requester_name || '?')[0].toUpperCase();
      return '<div class="bg-slate-50 rounded-xl p-3 border border-slate-100">' +
        '<div class="flex items-center gap-3 mb-2">' +
          '<div class="w-9 h-9 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 font-bold text-sm">' + initial + '</div>' +
          '<span class="font-semibold text-slate-800 text-sm">' + escP(r.requester_name) + '</span>' +
        '</div>' +
        (r.message ? '<p class="text-xs text-slate-500 mb-2 italic">"' + escP(r.message) + '"</p>' : '') +
        '<div class="flex gap-2">' +
          '<button type="button" onclick="acceptRequest(\'' + r.connection_id + '\')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition">Accept</button>' +
          '<button type="button" onclick="declineRequest(\'' + r.connection_id + '\')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-semibold px-3 py-1.5 rounded-lg transition">Decline</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function escP(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

  function showPeerTab(tab) {
    document.querySelectorAll('.peer-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.peer-tab').forEach(t => {
      t.classList.remove('text-indigo-600', 'border-indigo-600');
      t.classList.add('text-slate-400', 'border-transparent');
      t.setAttribute('aria-selected', 'false');
    });
    document.getElementById('peers-' + tab).classList.remove('hidden');
    const btn = document.getElementById('tab-' + tab);
    btn.classList.remove('text-slate-400', 'border-transparent');
    btn.classList.add('text-indigo-600', 'border-indigo-600');
    btn.setAttribute('aria-selected', 'true');
    if (tab === 'find') loadSuggestions();
  }

  async function loadSuggestions() {
    if (!token) return;
    try {
      const res = await fetch('/api/peers/suggestions', { headers: { Authorization: 'Bearer ' + token } });
      const data = await res.json();
      const list = document.getElementById('suggestions-list');
      const suggestions = data.data || [];
      if (!suggestions.length) { list.innerHTML = '<p class="text-slate-400 text-sm">No suggestions yet — join activities to find peers.</p>'; return; }
      list.innerHTML = suggestions.map(s => {
        const initial = (s.name || '?')[0].toUpperCase();
        return '<div class="flex items-center justify-between bg-slate-50 rounded-xl p-3 border border-slate-100">' +
          '<div class="flex items-center gap-3">' +
            '<div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm">' + initial + '</div>' +
            '<div>' +
              '<span class="font-semibold text-slate-800 text-sm block">' + escP(s.name) + '</span>' +
              '<span class="text-xs text-slate-400">' + escP(s.shared_activity) + '</span>' +
            '</div>' +
          '</div>' +
          '<button type="button" onclick="sendRequest(\'' + s.user_id + '\')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition">Connect</button>' +
        '</div>';
      }).join('');
    } catch(e) { console.error('loadSuggestions', e); }
  }

  async function sendRequest(userId) {
    try {
      const res = await fetch('/api/peers/request/' + userId, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({})
      });
      const data = await res.json();
      if (res.ok) { alert('Connection request sent!'); await loadSuggestions(); }
      else { alert(data.error || 'Failed'); }
    } catch(e) { alert(e.message); }
  }

  async function acceptRequest(connId) {
    try {
      const res = await fetch('/api/peers/' + connId + '/accept', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
      if (res.ok) { await loadPeers(); showPeerTab('connections'); }
      else { const d = await res.json(); alert(d.error || 'Failed'); }
    } catch(e) { alert(e.message); }
  }

  async function declineRequest(connId) {
    try {
      const res = await fetch('/api/peers/' + connId + '/decline', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
      if (res.ok) await loadPeers();
      else { const d = await res.json(); alert(d.error || 'Failed'); }
    } catch(e) { alert(e.message); }
  }

  async function removePeer(connId) {
    if (!confirm('Remove this connection?')) return;
    try {
      const res = await fetch('/api/peers/' + connId, { method: 'DELETE', headers: { Authorization: 'Bearer ' + token } });
      if (res.ok) await loadPeers();
      else { const d = await res.json(); alert(d.error || 'Failed'); }
    } catch(e) { alert(e.message); }
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (token) loadPeers();
  });


</script>
</body>
</html>
