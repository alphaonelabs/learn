<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – EduPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: { DEFAULT: '#4F46E5', dark: '#3730A3' } } } } };</script>
  <style>
    .hidden { display: none !important; }
    .gradient-hero { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 50%, #2563EB 100%); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

<!-- ── Navbar ─────────────────────────────────────────────────────────── -->
<nav class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
    <a href="/" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg gradient-hero flex items-center justify-center text-white font-bold text-sm">E</div>
      <span class="font-bold text-xl text-slate-800">EduPlatform</span>
    </a>
    <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-600">
      <a href="/" class="hover:text-brand">Courses</a>
      <a href="/dashboard.html" class="text-brand hover:text-brand-dark">Dashboard</a>
      <a href="/teach.html" class="hover:text-brand" id="teach-link">Teach</a>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-slate-600 text-sm hidden sm:block" id="nav-user"></span>
      <button onclick="logout()" class="text-slate-400 text-sm hover:text-red-500 transition">Logout</button>
    </div>
  </div>
</nav>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<div class="gradient-hero text-white py-12 px-4">
  <div class="max-w-7xl mx-auto">
    <p class="text-indigo-200 text-sm font-medium mb-1" id="header-role-label">Dashboard</p>
    <h1 class="text-3xl font-extrabold" id="header-welcome">Welcome!</h1>
    <p class="text-indigo-200 mt-1 text-sm" id="header-sub"></p>
  </div>
</div>

<!-- ── Body ───────────────────────────────────────────────────────────── -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <!-- Stat cards -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10" id="stat-cards"></div>

  <!-- Quick actions -->
  <div id="quick-actions" class="mb-8"></div>

  <!-- Courses list -->
  <h2 class="text-xl font-bold text-slate-800 mb-5" id="section-title">My Courses</h2>
  <div id="courses-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <div class="bg-white rounded-2xl p-6 animate-pulse h-40"></div>
    <div class="bg-white rounded-2xl p-6 animate-pulse h-40"></div>
    <div class="bg-white rounded-2xl p-6 animate-pulse h-40"></div>
  </div>

  <div id="empty-state" class="hidden text-center py-20 text-slate-400">
    <p class="text-5xl mb-4">📭</p>
    <p class="text-lg font-medium" id="empty-msg">Nothing here yet.</p>
    <a id="empty-action-link" href="/" class="mt-4 inline-block text-brand font-semibold hover:underline" id="empty-action-text">Browse courses</a>
  </div>

</main>

<!-- ── Footer ─────────────────────────────────────────────────────────── -->
<footer class="bg-slate-800 text-slate-400 py-6 text-center text-sm mt-10">
  <p>© 2024 EduPlatform · All data encrypted at rest</p>
</footer>

<script>
  const API = '';

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  const token = localStorage.getItem('edu_token');
  const user  = JSON.parse(localStorage.getItem('edu_user') || 'null');
  if (!token || !user) { window.location.href = '/login.html'; }

  function logout() {
    localStorage.removeItem('edu_token');
    localStorage.removeItem('edu_user');
    window.location.href = '/login.html';
  }

  const diffColour = { Beginner: 'bg-emerald-100 text-emerald-700', Intermediate: 'bg-amber-100 text-amber-700', Advanced: 'bg-red-100 text-red-700' };

  document.getElementById('nav-user').textContent = '👋 ' + user.username;

  if (user.role !== 'teacher') {
    document.getElementById('teach-link').style.display = 'none';
  }

  async function loadDashboard() {
    const res  = await fetch(`${API}/api/dashboard`, { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();

    if (data.role === 'teacher') {
      renderTeacher(data);
    } else {
      renderStudent(data);
    }
  }

  // ── Teacher view
  function renderTeacher(data) {
    const courses = data.courses_taught || [];
    document.getElementById('header-role-label').textContent = '📚 Educator Dashboard';
    document.getElementById('header-welcome').textContent    = `Hello, ${user.username}!`;
    document.getElementById('header-sub').textContent        = 'Manage your courses and track student engagement.';
    document.getElementById('section-title').textContent     = 'My Courses';

    document.getElementById('stat-cards').innerHTML = `
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
        <p class="text-3xl font-extrabold text-brand">${courses.length}</p>
        <p class="text-slate-500 text-sm mt-1">Courses Created</p>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
        <p class="text-3xl font-extrabold text-purple-600">${courses.reduce((s,c) => s + (c.enrolled_count||0), 0)}</p>
        <p class="text-slate-500 text-sm mt-1">Total Students</p>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
        <p class="text-3xl font-extrabold text-emerald-600">${courses.reduce((s,c) => s + (c.lesson_count||0), 0)}</p>
        <p class="text-slate-500 text-sm mt-1">Total Lessons</p>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
        <p class="text-3xl font-extrabold text-amber-500">🔒</p>
        <p class="text-slate-500 text-sm mt-1">Encrypted</p>
      </div>`;

    document.getElementById('quick-actions').innerHTML = `
      <div class="flex flex-wrap gap-3">
        <a href="/teach.html" class="inline-flex items-center gap-2 bg-brand text-white font-semibold px-5 py-2.5 rounded-xl hover:bg-brand-dark transition text-sm">
          ＋ New Course
        </a>
        <a href="/" class="inline-flex items-center gap-2 bg-white border border-slate-200 text-slate-700 font-semibold px-5 py-2.5 rounded-xl hover:bg-slate-50 transition text-sm">
          Browse All Courses
        </a>
      </div>`;

    if (courses.length === 0) {
      document.getElementById('courses-list').innerHTML = '';
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('empty-msg').textContent = "You haven't created any courses yet.";
      document.getElementById('empty-action-link').href = '/teach.html';
      document.getElementById('empty-action-text').textContent = 'Create your first course →';
      return;
    }

    document.getElementById('courses-list').innerHTML = courses.map(c => {
      const diff = diffColour[c.difficulty] || 'bg-slate-100 text-slate-600';
      return `
        <article class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-hover flex flex-col gap-3">
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-bold text-slate-800 text-sm leading-snug">${esc(c.title)}</h3>
            <span class="badge ${diff} shrink-0">${esc(c.difficulty)}</span>
          </div>
          <div class="flex gap-4 text-xs text-slate-500">
            <span>👥 ${c.enrolled_count} students</span>
            <span>📝 ${c.lesson_count} lessons</span>
          </div>
          <div class="mt-auto flex gap-2">
            <a href="/course.html?id=${c.id}" class="flex-1 text-center text-sm font-semibold text-brand border border-brand/30 rounded-lg py-1.5 hover:bg-indigo-50 transition">View</a>
            <a href="/teach.html?course_id=${c.id}" class="flex-1 text-center text-sm font-semibold text-slate-600 border border-slate-200 rounded-lg py-1.5 hover:bg-slate-50 transition">Edit</a>
          </div>
        </article>`;
    }).join('');
  }

  // ── Student view
  function renderStudent(data) {
    const courses = data.enrolled_courses || [];
    document.getElementById('header-role-label').textContent = '🎓 Student Dashboard';
    document.getElementById('header-welcome').textContent    = `Hello, ${user.username}!`;
    document.getElementById('header-sub').textContent        = 'Track your learning progress and continue where you left off.';
    document.getElementById('section-title').textContent     = 'My Enrolled Courses';

    const avgProg = courses.length ? Math.round(courses.reduce((s,c) => s+(c.progress||0), 0) / courses.length) : 0;
    const completed = courses.filter(c => c.progress === 100).length;

    document.getElementById('stat-cards').innerHTML = `
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
        <p class="text-3xl font-extrabold text-brand">${courses.length}</p>
        <p class="text-slate-500 text-sm mt-1">Enrolled</p>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
        <p class="text-3xl font-extrabold text-emerald-600">${completed}</p>
        <p class="text-slate-500 text-sm mt-1">Completed</p>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
        <p class="text-3xl font-extrabold text-purple-600">${avgProg}%</p>
        <p class="text-slate-500 text-sm mt-1">Avg. Progress</p>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
        <p class="text-3xl font-extrabold text-amber-500">🔒</p>
        <p class="text-slate-500 text-sm mt-1">Encrypted</p>
      </div>`;

    document.getElementById('quick-actions').innerHTML = `
      <div class="flex flex-wrap gap-3">
        <a href="/" class="inline-flex items-center gap-2 bg-brand text-white font-semibold px-5 py-2.5 rounded-xl hover:bg-brand-dark transition text-sm">
          ＋ Enrol in New Course
        </a>
      </div>`;

    if (courses.length === 0) {
      document.getElementById('courses-list').innerHTML = '';
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('empty-msg').textContent = "You haven't enrolled in any courses yet.";
      document.getElementById('empty-action-link').href = '/';
      document.getElementById('empty-action-text').textContent = 'Browse courses →';
      return;
    }

    document.getElementById('courses-list').innerHTML = courses.map(c => {
      const diff = diffColour[c.difficulty] || 'bg-slate-100 text-slate-600';
      const pct  = c.progress || 0;
      return `
        <article class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-hover flex flex-col gap-3">
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-bold text-slate-800 text-sm leading-snug">${esc(c.title)}</h3>
            <span class="badge ${diff} shrink-0">${esc(c.difficulty)}</span>
          </div>
          <p class="text-xs text-slate-400">by ${esc(c.teacher_name)}</p>
          <div>
            <div class="flex justify-between text-xs text-slate-500 mb-1">
              <span>Progress</span><span>${pct}%</span>
            </div>
            <div class="bg-slate-100 rounded-full h-2 overflow-hidden">
              <div class="progress-bar" style="width:${pct}%"></div>
            </div>
          </div>
          <a href="/course.html?id=${c.id}" class="mt-auto block text-center text-sm font-semibold text-brand border border-brand/30 rounded-lg py-1.5 hover:bg-indigo-50 transition">
            ${pct === 100 ? '✅ Review' : pct > 0 ? '▶ Continue' : '▶ Start'}
          </a>
        </article>`;
    }).join('');
  }

  loadDashboard().catch(e => {
    document.getElementById('courses-list').innerHTML =
      `<p class="col-span-3 text-red-400 text-sm">Failed to load dashboard: ${e.message}</p>`;
  });
</script>
</body>
</html>
